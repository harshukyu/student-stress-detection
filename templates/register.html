<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusMind | Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark px-4">

<a class="navbar-brand">🧠 CampusMind</a>

<div>
<a href="/" class="btn btn-outline-light">Home</a>
<a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
</div>

</nav>


<!-- Form Section -->

<div class="container">

<div class="container-box">

<h2 class="text-center mb-4">Student Stress Assessment</h2>

<p class="text-center mb-4">
Fill the information below to analyze your stress level.
</p>

<form action="/predict" method="POST">

<div class="row">

<!-- Name -->

<div class="col-md-6 mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" placeholder="Enter your name" required>
</div>


<!-- Age -->

<div class="col-md-6 mb-3">
<label class="form-label">Age</label>
<input type="number" class="form-control" placeholder="Enter age" required>
</div>


<!-- Study Hours -->

<div class="col-md-6 mb-3">
<label class="form-label">Study Hours Per Day</label>
<input type="number" name="study_hours" class="form-control" placeholder="e.g. 5" required>
</div>


<!-- Sleep Hours -->

<div class="col-md-6 mb-3">
<label class="form-label">Sleep Hours Per Day</label>
<input type="number" name="sleep_hours" class="form-control" placeholder="e.g. 7" required>
</div>


<!-- Social Interaction -->

<div class="col-md-6 mb-3">
<label class="form-label">Social Interaction Level</label>

<select name="social" class="form-control">

<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>

</select>

</div>


<!-- Academic Pressure -->

<div class="col-md-6 mb-3">

<label class="form-label">Academic Pressure</label>

<select name="pressure" class="form-control">

<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>

</select>

</div>

</div>


<!-- Submit Button -->

<div class="text-center mt-4">

<button class="btn btn-primary btn-lg px-5">

Analyze Stress

</button>

</div>

</form>

</div>

</div>


<!-- Footer -->

<footer class="text-center mt-5 mb-3">

<p>CampusMind © 2026 | AI Student Stress Detection</p>

</footer>

</body>
</html>
